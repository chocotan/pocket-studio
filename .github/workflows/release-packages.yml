name: Release Packages

on:
  push:
    tags:
      - '*'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package-linux:
    name: Build Linux release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            studio-frontend/package-lock.json
            user-frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          npm ci --prefix studio-frontend
          npm ci --prefix user-frontend

      - name: Build packages
        run: bash scripts/build-packages.sh linux

      - name: Rename release artifacts
        env:
          TAG_NAME: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          mkdir -p dist/release
          cp dist/pocket-studio-server-bin "dist/release/pocket-studio-server-linux-x86_64-${TAG_NAME}"
          cp dist/pocket-studio-daemon-bin "dist/release/pocket-studio-daemon-linux-x86_64-${TAG_NAME}"
          cp dist/electron/*.AppImage "dist/release/pocket-studio-linux-x86_64-${TAG_NAME}.AppImage"

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          files: dist/release/*

  package-macos:
    name: Build macOS release artifacts
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            studio-frontend/package-lock.json
            user-frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          npm ci --prefix studio-frontend
          npm ci --prefix user-frontend

      - name: Build packages
        run: bash scripts/build-packages.sh mac

      - name: Rename release artifacts
        env:
          TAG_NAME: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          mkdir -p dist/release
          cp dist/pocket-studio-server-bin "dist/release/pocket-studio-server-macos-arm64-${TAG_NAME}"
          cp dist/pocket-studio-daemon-bin "dist/release/pocket-studio-daemon-macos-arm64-${TAG_NAME}"
          cp dist/electron/*.dmg "dist/release/pocket-studio-macos-arm64-${TAG_NAME}.dmg"

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          files: dist/release/*

  package-windows:
    name: Build Windows release artifacts
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            studio-frontend/package-lock.json
            user-frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          npm ci --prefix studio-frontend
          npm ci --prefix user-frontend

      - name: Build packages
        shell: bash
        env:
          CGO_ENABLED: "1"
        run: bash scripts/build-packages.sh win

      - name: Rename release artifacts
        shell: bash
        env:
          TAG_NAME: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          mkdir -p dist/release
          cp dist/pocket-studio-server-bin.exe "dist/release/pocket-studio-server-windows-x86_64-${TAG_NAME}.exe"
          cp dist/pocket-studio-daemon-bin.exe "dist/release/pocket-studio-daemon-windows-x86_64-${TAG_NAME}.exe"
          cp dist/electron/*-setup.exe "dist/release/pocket-studio-windows-x86_64-${TAG_NAME}-setup.exe"

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          files: dist/release/*
